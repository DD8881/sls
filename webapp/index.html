<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Знижки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/static/analytics.js?v=11"></script>
  <link rel="stylesheet" href="/static/style.css?v=10">
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <div class="city-select-wrap">
        <button type="button" class="city-select-btn" id="city-btn">Оберіть місто</button>
        <div class="city-dropdown" id="city-dropdown"></div>
      </div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Пошук товарів за всіма категоріями">
      </div>
    </div>

    <div class="store-tabs" id="store-tabs"></div>

    <div class="store-filter-wrap" id="store-filter-wrap" style="display:none">
      <button type="button" class="store-filter-btn" id="store-filter-btn">Всі магазини</button>
    </div>

    <div class="category-select-wrap" id="category-wrap" style="display:none">
      <button type="button" class="category-select-btn" id="category-btn">Всі категорії</button>
      <div class="category-dropdown" id="category-dropdown"></div>
    </div>

    <div class="result-count" id="result-count" style="display:none"></div>

    <div class="products-grid" id="products-grid"></div>

    <div class="load-more" id="load-more" style="display:none">
      <button id="load-more-btn">Завантажити ще</button>
    </div>

    <div class="loading" id="loading" style="display:none">
      <div class="spinner"></div>
    </div>

    <div class="empty-state" id="empty-state" style="display:none">
      Нічого не знайдено
    </div>

    <div class="welcome" id="welcome" style="display:none">
      <img class="welcome-logo" src="/static/logo.png" alt="">
      <div class="welcome-title">Знижки супермаркетів</div>
      <div class="welcome-sub" id="welcome-sub">Оберіть місто, щоб побачити найкращі знижки поряд</div>
      <div class="welcome-date" id="welcome-date" style="display:none"></div>
      <button type="button" class="share-btn" id="share-btn" style="display:none">🔗 Поділитись ботом з другом</button>
      <button type="button" class="feedback-btn" id="feedback-btn">💬 Зворотній зв'язок</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="fb-overlay"></div>
  <div class="modal" id="fb-modal">
    <div class="modal-title">Зворотній зв'язок</div>
    <div class="modal-sub">Поділіться вашими відгуками чи пропозиціями</div>
    <textarea class="fb-textarea" id="fb-text" rows="5" maxlength="2000" placeholder="Ваше повідомлення..."></textarea>
    <div class="fb-actions">
      <button type="button" class="fb-cancel" id="fb-cancel">Скасувати</button>
      <button type="button" class="fb-send" id="fb-send">Надіслати</button>
    </div>
  </div>

  <div class="sheet-overlay" id="sheet-overlay"></div>
  <div class="sheet" id="store-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-search">
      <input type="text" id="sheet-search-input" placeholder="Пошук магазину...">
    </div>
    <div class="sheet-list" id="sheet-list"></div>
  </div>

  <script src="/static/app.js?v=11"></script>
</body>
</html>
